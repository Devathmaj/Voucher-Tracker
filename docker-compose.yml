services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: voucherbot
      POSTGRES_PASSWORD: voucherbot
      POSTGRES_DB: voucherbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voucherbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://voucherbot:voucherbot@db:5432/voucherbot
      IS_PROD: "false"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
